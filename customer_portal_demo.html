<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>더조은식품 — 발주 (데모)</title>
    <style>
        :root { --joeun-blue: #152484; --joeun-green: #B8D200; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .product-card { transition: transform 0.15s, box-shadow 0.15s; }
        .product-card:active { transform: scale(0.97); }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; cursor: pointer; transition: all 0.15s; user-select: none; }
        .cart-sheet { transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
        @keyframes badgePop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }
        .badge-pop { animation: badgePop 0.25s ease; }
        .tab-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px 4px; gap:3px; font-size:10px; font-weight:700; cursor:pointer; transition:color 0.15s; }
        .tab-btn.active { color: #152484; }
        .tab-btn:not(.active) { color: #94a3b8; }
        .demo-badge { position:fixed; top:12px; right:12px; background:#f97316; color:white; font-size:10px; font-weight:900; padding:4px 10px; border-radius:20px; z-index:999; letter-spacing:0.05em; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

    <div class="demo-badge">DEMO</div>

    <!-- 헤더 -->
    <header class="sticky top-0 z-40 bg-white border-b border-gray-100 shadow-sm">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <div>
                <p class="text-[10px] font-black text-[#152484] tracking-widest uppercase">더조은식품</p>
                <h1 class="text-base font-black text-gray-900 leading-tight">락희차이나 <span class="text-[10px] font-bold text-gray-400 ml-1">발주</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="장바구니시트열기()" class="relative p-2">
                    <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                    <span id="cart-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-[10px] font-black rounded-full flex items-center justify-center">0</span>
                </button>
                <span class="text-[10px] font-black text-gray-300">로그아웃</span>
            </div>
        </div>
    </header>

    <div class="max-w-2xl mx-auto">

        <!-- 주문하기 탭 -->
        <div id="tab-order" class="px-4 pt-4">

            <!-- 검색바 -->
            <div class="relative mb-4">
                <input type="text" id="search-input" placeholder="상품명 또는 초성 검색 (예: ㅇㅍ → 양파)"
                    class="w-full border-2 border-gray-100 rounded-2xl p-4 pl-11 text-sm font-bold bg-white focus:border-[#152484] outline-none shadow-sm"
                    oninput="상품검색및렌더링()">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>

            <!-- 카테고리 탭 -->
            <div class="flex gap-2 overflow-x-auto pb-2 mb-4">
                <button onclick="카테고리선택('전체')" id="cat-전체" class="cat-tab px-4 py-2 bg-[#152484] text-white rounded-full font-black text-xs whitespace-nowrap shadow-md">전체</button>
                <button onclick="카테고리선택('공산')" id="cat-공산" class="cat-tab px-4 py-2 bg-white text-gray-500 border rounded-full font-bold text-xs whitespace-nowrap">공산</button>
                <button onclick="카테고리선택('농산')" id="cat-농산" class="cat-tab px-4 py-2 bg-white text-gray-500 border rounded-full font-bold text-xs whitespace-nowrap">농산</button>
                <button onclick="카테고리선택('수산')" id="cat-수산" class="cat-tab px-4 py-2 bg-white text-gray-500 border rounded-full font-bold text-xs whitespace-nowrap">수산</button>
                <button onclick="카테고리선택('축산')" id="cat-축산" class="cat-tab px-4 py-2 bg-white text-gray-500 border rounded-full font-bold text-xs whitespace-nowrap">축산</button>
            </div>

            <!-- 상품 그리드 -->
            <div class="grid grid-cols-2 gap-3" id="product-grid"></div>
        </div>

        <!-- 주문현황 탭 -->
        <div id="tab-history" class="px-4 pt-4 hidden">
            <h2 class="text-sm font-black text-gray-900 mb-4">내 주문 현황</h2>
            <div class="space-y-4">
                <!-- 샘플 주문 -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="p-4 border-b border-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-black px-3 py-1 rounded-full bg-green-100 text-green-700">배송완료</span>
                            <span class="text-[10px] text-gray-400 font-bold">2025.04.20</span>
                        </div>
                        <p class="text-sm font-black text-gray-900">양파 20kg 외 3건</p>
                        <p class="text-xs text-gray-400 mt-1">납품일: 2025.04.21</p>
                    </div>
                    <div class="px-4 py-3 flex items-center justify-between bg-gray-50">
                        <span class="text-xs font-bold text-gray-500">4개 품목</span>
                        <span class="text-sm font-black text-[#152484]">₩234,000</span>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border border-blue-100 shadow-sm overflow-hidden">
                    <div class="p-4 border-b border-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-black px-3 py-1 rounded-full bg-purple-100 text-purple-700">출고중</span>
                            <span class="text-[10px] text-gray-400 font-bold">2025.04.23</span>
                        </div>
                        <p class="text-sm font-black text-gray-900">대파 5단 외 2건</p>
                        <p class="text-xs text-gray-400 mt-1">납품 희망일: 2025.04.24</p>
                    </div>
                    <div class="px-4 py-3 flex items-center justify-between bg-gray-50">
                        <span class="text-xs font-bold text-gray-500">3개 품목</span>
                        <span class="text-sm font-black text-[#152484]">₩156,000</span>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="p-4 border-b border-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-black px-3 py-1 rounded-full bg-gray-100 text-gray-600 animate-pulse">접수</span>
                            <span class="text-[10px] text-gray-400 font-bold">방금 전</span>
                        </div>
                        <p class="text-sm font-black text-gray-900">돼지목살 5kg 외 1건</p>
                        <p class="text-xs text-gray-400 mt-1">납품 희망일: 2025.04.25</p>
                    </div>
                    <div class="px-4 py-3 flex items-center justify-between bg-gray-50">
                        <span class="text-xs font-bold text-gray-500">2개 품목</span>
                        <span class="text-sm font-black text-[#152484]">₩98,000</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 하단 탭바 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 flex shadow-lg">
        <button class="tab-btn active" id="nav-order" onclick="네비탭전환('order')">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            발주하기
        </button>
        <button class="tab-btn" id="nav-history" onclick="네비탭전환('history')">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            주문현황
        </button>
    </nav>

    <!-- 장바구니 시트 -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/50 z-50 hidden" onclick="장바구니시트닫기()"></div>
    <div id="cart-sheet" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2rem] z-50 shadow-2xl max-h-[85vh] flex flex-col translate-y-full cart-sheet">
        <div class="flex items-center justify-between p-6 border-b border-gray-100 flex-shrink-0">
            <h2 class="text-base font-black text-gray-900">장바구니</h2>
            <button onclick="장바구니시트닫기()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4" id="cart-items-list"></div>

        <div class="p-6 border-t border-gray-100 flex-shrink-0 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">납품 희망일 *</label>
                    <input type="date" id="delivery-date" class="w-full border-2 border-[#152484]/30 rounded-xl p-3 text-sm font-bold bg-white focus:border-[#152484] outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">요청사항</label>
                    <input type="text" id="order-notes" placeholder="특이사항 입력" class="w-full border-2 border-gray-100 rounded-xl p-3 text-sm font-bold bg-gray-50 outline-none">
                </div>
            </div>
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase">주문 합계</p>
                    <p class="text-2xl font-black text-[#152484]" id="cart-total-display">₩0</p>
                </div>
                <button onclick="발주제출데모()" class="bg-[#152484] text-white px-8 py-4 rounded-2xl font-black text-sm shadow-lg hover:opacity-90 active:scale-95 transition-all">
                    발주 접수하기
                </button>
            </div>
        </div>
    </div>

    <script>
    // ── 샘플 상품 데이터 ──────────────────────────────────────
    const 상품목록 = [
        { code:'P001', name:'양파 20kg', category:'농산', price:28000, unit:'박스', spec:'20kg', taxable:false,
          img:'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&q=80' },
        { code:'P002', name:'대파 5단', category:'농산', price:15000, unit:'단', spec:'5단', taxable:false,
          img:'https://images.unsplash.com/photo-1558789531-780782e67a17?w=400&q=80' },
        { code:'P003', name:'마늘 1kg', category:'농산', price:12000, unit:'봉', spec:'1kg', taxable:false,
          img:'https://images.unsplash.com/photo-1587049352851-8d4e89133924?w=400&q=80' },
        { code:'P004', name:'돼지목살 5kg', category:'축산', price:68000, unit:'팩', spec:'5kg', taxable:false,
          img:'https://images.unsplash.com/photo-1615485291192-4fe6944c9e76?w=400&q=80' },
        { code:'P005', name:'계란 30구', category:'축산', price:9900, unit:'판', spec:'30구', taxable:false,
          img:'https://images.unsplash.com/photo-1506976785307-8732e854ad03?w=400&q=80' },
        { code:'P006', name:'고등어 5마리', category:'수산', price:22000, unit:'묶음', spec:'5마리', taxable:false,
          img:'https://images.unsplash.com/photo-1544943910-4c1dc44aab44?w=400&q=80' },
        { code:'P007', name:'참기름 500ml', category:'공산', price:18000, unit:'병', spec:'500ml', taxable:true,
          img:'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=400&q=80' },
        { code:'P008', name:'진간장 1.8L', category:'공산', price:8500, unit:'병', spec:'1.8L', taxable:true,
          img:'https://images.unsplash.com/photo-1617093727343-374698b1b08d?w=400&q=80' },
        { code:'P009', name:'고추장 500g', category:'공산', price:7200, unit:'통', spec:'500g', taxable:true,
          img:'https://images.unsplash.com/photo-1585951237318-9ea5e175b891?w=400&q=80' },
        { code:'P010', name:'두부 300g×4', category:'공산', price:5600, unit:'묶음', spec:'300g×4', taxable:false,
          img:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80' },
    ];

    // 초성 검색 (utils.js 없이 자체 구현)
    const 초성배열 = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    function 초성추출(str) {
        let r=''; for(let i=0;i<str.length;i++){const c=str.charCodeAt(i)-44032; r+=c>-1&&c<11172?초성배열[Math.floor(c/588)]:str[i];} return r;
    }

    let 현재카테고리 = '전체';
    let 장바구니 = {};

    // 내일 날짜 기본값
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
    document.getElementById('delivery-date').valueAsDate = tomorrow;

    // ── 상품 렌더링 ───────────────────────────────────────────
    function 상품검색및렌더링() {
        const kw = document.getElementById('search-input').value.toLowerCase().replace(/\s/g,'');
        let list = 현재카테고리 === '전체' ? 상품목록 : 상품목록.filter(p=>p.category===현재카테고리);
        if (kw) {
            const cho = 초성추출(kw);
            list = list.filter(p => {
                const n = p.name.toLowerCase().replace(/\s/g,'');
                return n.includes(kw) || 초성추출(n).includes(cho);
            });
        }
        상품그리드_렌더링(list);
    }

    function 상품그리드_렌더링(list) {
        const grid = document.getElementById('product-grid');
        if (!list.length) { grid.innerHTML='<div class="col-span-2 py-16 text-center text-gray-400 text-sm">해당 상품이 없습니다.</div>'; return; }

        grid.innerHTML = list.map(p => {
            const qty = 장바구니[p.code]?.qty || 0;
            const displayPrice = Math.round(p.price * (p.taxable ? 1.1 : 1));
            const taxBadge = !p.taxable ? '' : '<span class="text-[9px] text-gray-400 bg-gray-100 px-1 rounded ml-1">과세</span>';

            return `
            <div class="product-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="relative bg-gray-50 overflow-hidden" style="aspect-ratio:1">
                    <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="w-full h-full bg-gray-100 items-center justify-center text-4xl hidden" style="display:none">📦</div>
                    ${!p.taxable ? '<span class="absolute top-2 left-2 text-[9px] font-black bg-orange-500 text-white px-2 py-0.5 rounded-full">면세</span>' : ''}
                </div>
                <div class="p-3">
                    <p class="text-xs font-black text-gray-900 leading-snug mb-0.5">${p.name}</p>
                    <p class="text-[10px] text-gray-400 mb-2">${p.spec} ${taxBadge}</p>
                    <p class="text-sm font-black text-[#152484] mb-3">₩${displayPrice.toLocaleString()}</p>
                    ${qty === 0
                        ? `<button onclick="수량변경('${p.code}',1)" class="w-full py-2 bg-[#152484] text-white rounded-xl font-black text-xs hover:opacity-90 active:scale-95 transition-all">+ 담기</button>`
                        : `<div class="flex items-center gap-2 justify-between">
                              <button onclick="수량변경('${p.code}',${qty-1})" class="qty-btn bg-gray-100 text-gray-600 hover:bg-gray-200">−</button>
                              <span class="font-black text-[#152484] text-base w-6 text-center">${qty}</span>
                              <button onclick="수량변경('${p.code}',${qty+1})" class="qty-btn bg-[#152484] text-white hover:opacity-90">+</button>
                           </div>`
                    }
                </div>
            </div>`;
        }).join('');
    }

    function 카테고리선택(cat) {
        현재카테고리 = cat;
        document.querySelectorAll('.cat-tab').forEach(btn => {
            const c = btn.id.replace('cat-','');
            btn.className = `cat-tab px-4 py-2 rounded-full font-black text-xs whitespace-nowrap transition ${
                c===cat ? 'bg-[#152484] text-white shadow-md' : 'bg-white text-gray-500 border hover:border-[#152484]'
            }`;
        });
        상품검색및렌더링();
    }

    // ── 장바구니 ─────────────────────────────────────────────
    function 수량변경(code, qty) {
        const p = 상품목록.find(x=>x.code===code);
        if (!p) return;
        if (qty <= 0) delete 장바구니[code];
        else 장바구니[code] = { ...p, qty, unit_price: Math.round(p.price*(p.taxable?1.1:1)) };
        배지업데이트();
        상품검색및렌더링();
    }

    function 배지업데이트() {
        const cnt = Object.values(장바구니).reduce((s,i)=>s+i.qty,0);
        const badge = document.getElementById('cart-badge');
        if (cnt > 0) { badge.innerText=cnt; badge.classList.remove('hidden'); badge.classList.add('badge-pop'); setTimeout(()=>badge.classList.remove('badge-pop'),300); }
        else badge.classList.add('hidden');
    }

    function 장바구니시트열기() {
        if (!Object.keys(장바구니).length) { alert('장바구니가 비어있습니다.'); return; }
        시트_렌더링();
        document.getElementById('cart-overlay').classList.remove('hidden');
        document.getElementById('cart-sheet').classList.remove('translate-y-full');
    }
    function 장바구니시트닫기() {
        document.getElementById('cart-sheet').classList.add('translate-y-full');
        document.getElementById('cart-overlay').classList.add('hidden');
    }

    function 시트_렌더링() {
        const items = Object.values(장바구니);
        const total = items.reduce((s,i)=>s+i.unit_price*i.qty,0);
        document.getElementById('cart-total-display').innerText = '₩'+total.toLocaleString();
        document.getElementById('cart-items-list').innerHTML = items.map(item=>`
            <div class="flex items-center gap-3 py-3 border-b border-gray-100 last:border-0">
                <div class="w-14 h-14 rounded-xl bg-gray-100 overflow-hidden flex-shrink-0">
                    <img src="${item.img}" class="w-full h-full object-cover" onerror="this.style.display='none'">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-black text-gray-900 truncate">${item.name}</p>
                    <p class="text-xs text-gray-400">₩${item.unit_price.toLocaleString()} × ${item.qty} = <span class="font-black text-[#152484]">₩${(item.unit_price*item.qty).toLocaleString()}</span></p>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <button onclick="시트수량변경('${item.code}',${item.qty-1})" class="qty-btn bg-gray-100 text-gray-600">−</button>
                    <span class="font-black text-sm w-5 text-center">${item.qty}</span>
                    <button onclick="시트수량변경('${item.code}',${item.qty+1})" class="qty-btn bg-[#152484] text-white">+</button>
                </div>
            </div>`).join('');
    }

    function 시트수량변경(code, qty) { 수량변경(code, qty); 시트_렌더링(); }

    function 발주제출데모() {
        const date  = document.getElementById('delivery-date').value;
        const notes = document.getElementById('order-notes').value;
        const items = Object.values(장바구니);
        if (!date) { alert('납품 희망일을 선택해 주세요.'); return; }
        const total = items.reduce((s,i)=>s+i.unit_price*i.qty,0);
        alert(`✅ 발주가 접수되었습니다!\n\n납품 희망일: ${date}\n품목 수: ${items.length}개\n합계: ₩${total.toLocaleString()}\n${notes?`요청사항: ${notes}`:''}\n\n(데모) 실제 환경에서는 더조은식품 담당자에게 알림이 전송됩니다.`);
        장바구니 = {}; 배지업데이트(); 장바구니시트닫기(); 상품검색및렌더링(); 네비탭전환('history');
    }

    // ── 네비 탭 ──────────────────────────────────────────────
    function 네비탭전환(tab) {
        document.getElementById('tab-order').classList.toggle('hidden', tab!=='order');
        document.getElementById('tab-history').classList.toggle('hidden', tab!=='history');
        ['order','history'].forEach(t => document.getElementById(`nav-${t}`).classList.toggle('active', t===tab));
    }

    // 초기 렌더링
    상품그리드_렌더링(상품목록);
    </script>
</body>
</html>

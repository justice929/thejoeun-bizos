<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>정의의 기사 - 실시간 재고 상황판</title>
    <style>
        :root { --knight-blue: #152484; --knight-green: #B8D200; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-knight-blue { background-color: var(--knight-blue); }
        .text-knight-blue { color: var(--knight-blue); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes pulse-red { 0%,100%{background:#fee2e2} 50%{background:#fecaca} }
        @keyframes pulse-orange { 0%,100%{background:#fff7ed} 50%{background:#fed7aa} }
        .alert-danger  { animation: pulse-red    2s infinite; }
        .alert-warning { animation: pulse-orange 2s infinite; }
    </style>
</head>
<body class="bg-gray-50 flex min-h-screen pb-20 md:pb-0" id="main-body" style="display:none;">

    <div id="sidebar-container"></div>

    <main class="flex-1 md:ml-64 p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 border-b-2 border-knight-blue pb-6">
            <div>
                <p class="text-xs font-bold text-knight-blue tracking-[0.2em] uppercase">The Joeun Food Control Tower</p>
                <h2 class="text-3xl font-black text-gray-900 tracking-tighter">실시간 <span class="text-knight-blue">재고 상황판</span></h2>
            </div>
            <button onclick="재고데이터_불러오기()" class="bg-white border-2 border-knight-blue text-knight-blue px-6 py-3 rounded-xl font-black text-sm hover:bg-gray-50 shadow-md transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                데이터 동기화
            </button>
        </header>

        <!-- KPI 카드 (4개) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">총 관리 품목</p>
                    <p class="text-3xl font-black text-gray-900" id="stat-total-items">0</p>
                </div>
                <span class="text-2xl">📦</span>
            </div>
            <div class="bg-knight-blue p-5 rounded-3xl shadow-lg flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-[#B8D200] uppercase tracking-widest mb-1">재고 자산 가치</p>
                    <p class="text-2xl font-black text-white tracking-tighter" id="stat-total-value">₩0</p>
                </div>
                <span class="text-2xl">💰</span>
            </div>
            <div class="bg-red-50 p-5 rounded-3xl shadow-sm border border-red-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">발주 요망 (재고↓)</p>
                    <p class="text-3xl font-black text-red-600" id="stat-alert-items">0</p>
                </div>
                <span class="text-2xl">🚨</span>
            </div>
            <div class="bg-orange-50 p-5 rounded-3xl shadow-sm border border-orange-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">소비기한 D-14 이내</p>
                    <p class="text-3xl font-black text-orange-600" id="stat-expiry-items">0</p>
                </div>
                <span class="text-2xl">⏳</span>
            </div>
        </div>

        <!-- 재고 메인 테이블 -->
        <section class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 mb-8 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-knight-blue uppercase tracking-widest">Inventory Master Board</h3>
                <input type="text" placeholder="품목명 검색..." class="border-2 border-gray-100 rounded-xl p-2 text-sm font-bold bg-gray-50 focus:border-knight-blue outline-none w-56" onkeyup="테이블검색(this)">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="inventory-table">
                    <thead>
                        <tr class="bg-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-widest border-y border-gray-100">
                            <th class="p-4">품목명</th>
                            <th class="p-4 text-center">총 매입</th>
                            <th class="p-4 text-center">총 매출</th>
                            <th class="p-4 text-center bg-[#B8D200]/10 text-knight-blue">현재 재고</th>
                            <th class="p-4 text-right bg-knight-blue/5 text-knight-blue">박스 환산</th>
                            <th class="p-4 text-center text-orange-500">최근 소비기한</th>
                            <th class="p-4 text-center">상태</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm font-bold" id="inventory-list">
                        <tr><td colspan="7" class="p-10 text-center text-gray-400">데이터 분석 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 소비기한 임박 현황 -->
        <section class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-orange-100 overflow-hidden">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-2xl">⏳</span>
                <h3 class="text-sm font-black text-orange-600 uppercase tracking-widest">소비기한 임박 현황 (D-30 이내)</h3>
            </div>
            <div id="expiry-section">
                <p class="text-sm text-gray-400 text-center py-6">데이터 분석 중...</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <script>
        let 현재로그인유저 = '';

        async function 로그인_확인() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            현재로그인유저 = session.user.email;
            document.getElementById('main-body').style.display = 'flex';
            재고데이터_불러오기();
        }

        // items_json을 안전하게 배열로 변환
        function parseItems(items_json) {
            if (!items_json) return [];
            if (Array.isArray(items_json)) return items_json;
            try { return JSON.parse(items_json); } catch { return []; }
        }

        // D-day 계산 (오늘 기준, 음수 = 이미 만료)
        function D일(expiryStr) {
            if (!expiryStr) return null;
            const today = new Date(); today.setHours(0,0,0,0);
            const exp = new Date(expiryStr); exp.setHours(0,0,0,0);
            return Math.floor((exp - today) / 86400000);
        }

        async function 재고데이터_불러오기() {
            const [inboundRes, outboundRes, productRes] = await Promise.all([
                supabaseClient.from('inbound_ledger').select('*'),
                supabaseClient.from('outbound_ledger').select('*'),
                supabaseClient.from('product_master').select('item_name, box_qty, base_price, shelf_days')
            ]);

            const inbound  = inboundRes.data  || [];
            const outbound = outboundRes.data  || [];
            const products = productRes.data   || [];

            // 상품 마스터 맵 (box_qty, base_price 조회용)
            const productMap = {};
            products.forEach(p => { productMap[p.item_name] = p; });

            // ── 재고 맵 구축 (items_json 기반) ──────────────────
            const 재고맵 = {}; // { name: { in, out, price, box_qty, batches[] } }

            inbound.forEach(record => {
                const items = parseItems(record.items_json);

                if (items.length === 0) {
                    // 구버전 레코드 fallback: 상단 필드 사용
                    const name = record.item_name || '미분류';
                    if (!재고맵[name]) 재고맵[name] = { in: 0, out: 0, price: 0, box_qty: 1, batches: [] };
                    재고맵[name].in += (record.quantity || 0);
                } else {
                    items.forEach(item => {
                        const name = item.name || '미분류';
                        if (!재고맵[name]) {
                            const pm = productMap[name] || {};
                            재고맵[name] = { in: 0, out: 0, price: pm.base_price || 0, box_qty: pm.box_qty || 1, batches: [] };
                        }
                        재고맵[name].in    += (item.qty || 0);
                        재고맵[name].price  = item.price || 재고맵[name].price;

                        if (item.expiry_date) {
                            재고맵[name].batches.push({
                                qty: item.qty,
                                expiry_date: item.expiry_date,
                                vendor: record.vendor,
                                dday: D일(item.expiry_date)
                            });
                        }
                    });
                }
            });

            outbound.forEach(record => {
                const items = parseItems(record.items_json);

                if (items.length === 0) {
                    const name = record.item_name || '미분류';
                    if (!재고맵[name]) 재고맵[name] = { in: 0, out: 0, price: 0, box_qty: 1, batches: [] };
                    재고맵[name].out += (record.quantity || 0);
                } else {
                    items.forEach(item => {
                        const name = item.name || '미분류';
                        if (!재고맵[name]) 재고맵[name] = { in: 0, out: 0, price: 0, box_qty: 1, batches: [] };
                        재고맵[name].out += (item.qty || 0);
                    });
                }
            });

            // ── 메인 테이블 렌더링 ────────────────────────────────
            let html = '';
            let 위험품목수 = 0;
            let 총자산가치 = 0;
            const 품목목록 = Object.keys(재고맵);

            품목목록.forEach(name => {
                const d = 재고맵[name];
                const 재고 = Math.max(0, d.in - d.out);
                const box_qty = d.box_qty || 1;
                총자산가치 += 재고 * d.price;

                const boxes = Math.floor(재고 / box_qty);
                const ea    = 재고 % box_qty;
                const 박스표현 = `${boxes} <span class="text-[10px] text-gray-400 font-normal">BOX</span> ${ea} <span class="text-[10px] text-gray-400 font-normal">EA</span>`;

                // 최근 소비기한 (가장 빠른 것)
                const 만료예정 = d.batches.filter(b => b.expiry_date).sort((a,b) => a.dday - b.dday);
                let 소비기한셀 = '<span class="text-[10px] text-gray-300">미입력</span>';
                let 소비기한경고 = '';
                if (만료예정.length > 0) {
                    const 최근 = 만료예정[0];
                    const dd = 최근.dday;
                    소비기한셀 = 최근.expiry_date;
                    if (dd < 0)   소비기한셀 = `<span class="text-[10px] font-black text-white bg-gray-400 px-2 py-1 rounded-full">만료</span>`;
                    else if (dd <= 3)  { 소비기한셀 = `<span class="text-[10px] font-black text-white bg-red-500 px-2 py-1 rounded-full">D-${dd}</span>`; 소비기한경고 = 'alert-danger'; }
                    else if (dd <= 7)  { 소비기한셀 = `<span class="text-[10px] font-black text-white bg-orange-500 px-2 py-1 rounded-full">D-${dd}</span>`; 소비기한경고 = 'alert-warning'; }
                    else if (dd <= 14) 소비기한셀 = `<span class="text-[10px] font-black text-yellow-700 bg-yellow-100 px-2 py-1 rounded-full">D-${dd}</span>`;
                    else 소비기한셀 = `<span class="text-[10px] text-gray-400">${최근.expiry_date}</span>`;
                }

                // 재고 상태
                let 상태뱃지 = `<span class="px-3 py-1 bg-green-100 text-green-600 rounded-full text-[10px] font-black">정상</span>`;
                let 경고클래스 = 소비기한경고;
                if (재고 === 0) {
                    상태뱃지 = `<span class="px-3 py-1 bg-gray-100 text-gray-500 rounded-full text-[10px] font-black">품절</span>`;
                    경고클래스 = '';
                } else if (재고 < 10) {
                    상태뱃지 = `<span class="px-3 py-1 bg-red-100 text-red-600 rounded-full text-[10px] font-black">발주 요망</span>`;
                    경고클래스 = ''; // 재고 부족은 별도 색상 없이 뱃지로만 표시
                    위험품목수++;
                }

                html += `
                <tr class="${경고클래스} hover:bg-gray-50 transition-colors border-b border-gray-50">
                    <td class="p-4 font-black text-gray-900">${name}</td>
                    <td class="p-4 text-center text-knight-blue text-xs">${d.in.toLocaleString()}</td>
                    <td class="p-4 text-center text-orange-500 text-xs">${d.out.toLocaleString()}</td>
                    <td class="p-4 text-center bg-[#B8D200]/5 font-black text-knight-blue text-xl">${재고.toLocaleString()}</td>
                    <td class="p-4 text-right bg-knight-blue/5 font-black text-gray-900">${박스표현}</td>
                    <td class="p-4 text-center">${소비기한셀}</td>
                    <td class="p-4 text-center">${상태뱃지}</td>
                </tr>`;
            });

            if (!html) html = '<tr><td colspan="7" class="p-10 text-center text-gray-400">등록된 재고 데이터가 없습니다. 매입 장부를 먼저 작성해주세요.</td></tr>';

            document.getElementById('inventory-list').innerHTML = html;
            document.getElementById('stat-total-items').innerText = 품목목록.length;
            document.getElementById('stat-total-value').innerText = '₩' + 총자산가치.toLocaleString();
            document.getElementById('stat-alert-items').innerText = 위험품목수;

            // ── 소비기한 임박 현황 렌더링 ──────────────────────────
            소비기한현황_렌더링(재고맵);
        }

        function 소비기한현황_렌더링(재고맵) {
            // 30일 이내 만료 배치들을 모두 수집
            const 임박목록 = [];
            Object.entries(재고맵).forEach(([name, d]) => {
                d.batches.forEach(b => {
                    if (b.dday !== null && b.dday <= 30) {
                        임박목록.push({ name, ...b });
                    }
                });
            });

            document.getElementById('stat-expiry-items').innerText =
                임박목록.filter(i => i.dday <= 14).length;

            const container = document.getElementById('expiry-section');
            if (임박목록.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">소비기한 임박 품목이 없습니다. ✅</p>';
                return;
            }

            // D-day 오름차순 정렬
            임박목록.sort((a, b) => a.dday - b.dday);

            const rows = 임박목록.map(item => {
                const dd = item.dday;
                let ddBadge, rowClass = '';
                if (dd < 0)   { ddBadge = `<span class="px-3 py-1 bg-gray-200 text-gray-600 rounded-full text-xs font-black">만료됨</span>`; rowClass='opacity-50'; }
                else if (dd === 0) { ddBadge = `<span class="px-3 py-1 bg-red-600 text-white rounded-full text-xs font-black animate-pulse">D-DAY</span>`; rowClass='alert-danger'; }
                else if (dd <= 3)  { ddBadge = `<span class="px-3 py-1 bg-red-500 text-white rounded-full text-xs font-black">D-${dd}</span>`; rowClass='alert-danger'; }
                else if (dd <= 7)  { ddBadge = `<span class="px-3 py-1 bg-orange-500 text-white rounded-full text-xs font-black">D-${dd}</span>`; rowClass='alert-warning'; }
                else if (dd <= 14) { ddBadge = `<span class="px-3 py-1 bg-yellow-400 text-yellow-900 rounded-full text-xs font-black">D-${dd}</span>`; }
                else               { ddBadge = `<span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-black">D-${dd}</span>`; }

                return `
                <tr class="${rowClass} border-b border-gray-100 hover:bg-orange-50 transition-colors">
                    <td class="p-4 font-black text-gray-900">${item.name}</td>
                    <td class="p-4 text-center">${ddBadge}</td>
                    <td class="p-4 text-center font-bold text-gray-500">${item.expiry_date}</td>
                    <td class="p-4 text-center font-black text-knight-blue">${(item.qty || 0).toLocaleString()}</td>
                    <td class="p-4 text-sm text-gray-400">${item.vendor || '-'}</td>
                </tr>`;
            }).join('');

            container.innerHTML = `
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-orange-50 text-[10px] font-black text-orange-500 uppercase tracking-widest">
                        <tr class="border-b border-orange-100">
                            <th class="p-4">품목명</th>
                            <th class="p-4 text-center">D-Day</th>
                            <th class="p-4 text-center">소비기한</th>
                            <th class="p-4 text-center">수량</th>
                            <th class="p-4">공급처</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm font-bold">${rows}</tbody>
                </table>
            </div>`;
        }

        function 테이블검색(input) {
            const filter = input.value.toUpperCase();
            const rows = document.getElementById('inventory-list').getElementsByTagName('tr');
            for (const row of rows) {
                const td = row.getElementsByTagName('td')[0];
                if (td) row.style.display = td.textContent.toUpperCase().includes(filter) ? '' : 'none';
            }
        }

        로그인_확인();
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
